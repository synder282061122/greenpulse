<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GreenPulse 🌿 v3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Kanit:wght@500;700;800&display=swap" rel="stylesheet">
<!-- SheetJS for multi-sheet Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- JSZip for ZIP photo export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ══════════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════════ */
:root{
  --mint:#00c896;--mint2:#00a87a;--mint3:#e6fdf5;
  --sky:#38bdf8;--sky2:#0ea5e9;--sky3:#e0f7ff;
  --teal:#0d9488;
  --bg:#f0fdf9;--bg2:#e6fdf5;
  --card:#fff;
  --border:#c8f0e0;--border2:#a7f3d0;
  --text:#0f4c35;--text2:#166534;--muted:#6b9e89;--dim:#9dc5b5;
  --red:#ef4444;--red2:#fee2e2;
  --orange:#f97316;--orange2:#ffedd5;
  --yellow:#eab308;--yellow2:#fef9c3;
  --shadow:0 4px 20px rgba(0,200,150,.12);
  --shadow2:0 2px 8px rgba(0,200,150,.07);
  --radius:14px;--radius2:10px;--radius3:20px;
  --CCH:#00c896;--CHBR:#38bdf8;--CWR:#f97316;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-size:14px}
body{font-family:'Nunito','Sarabun',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ══ LAYOUT ══ */
#app{height:100vh;display:flex;flex-direction:column}
.layout{flex:1;display:flex;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);background:#fff;border-right:2px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
  transition:transform .3s,width .3s;z-index:200;
}
.main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.page-wrap{padding:20px;max-width:1100px;margin:0 auto;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ══ TOPBAR ══ */
.topbar{
  height:54px;background:#fff;border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 16px;
  flex-shrink:0;box-shadow:var(--shadow2);z-index:100;position:sticky;top:0;
}
.logo{display:flex;align-items:center;gap:8px;font-family:'Kanit',sans-serif;font-weight:800;font-size:17px;color:var(--mint);cursor:pointer;text-decoration:none}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--mint),var(--teal));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 8px rgba(0,200,150,.3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.tnav{display:flex;gap:3px;align-items:center}
.tnav-btn{padding:6px 13px;border-radius:20px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .18s;white-space:nowrap}
.tnav-btn:hover{background:var(--mint3);color:var(--mint)}
.tnav-btn.act{background:linear-gradient(135deg,var(--mint),var(--teal));color:#fff;box-shadow:0 2px 8px rgba(0,200,150,.28)}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .18s;position:relative;flex-shrink:0}
.icon-btn:hover{background:var(--mint3);border-color:var(--mint)}
.notif-dot{position:absolute;top:3px;right:3px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid #fff}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 12px;background:var(--bg2);border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:12px;font-weight:700}
.user-chip:hover{background:var(--mint3);border-color:var(--mint)}
.user-dot{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--mint),var(--teal));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.hamburger{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--mint);padding:4px}

/* ══ SIDEBAR ══ */
.s-head{padding:14px 12px 10px;border-bottom:1.5px solid var(--border)}
.s-user-card{background:linear-gradient(135deg,var(--mint3),var(--sky3));border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.s-user-init{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--mint),var(--teal));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;font-family:'Kanit',sans-serif;flex-shrink:0}
.s-user-name{font-size:12px;font-weight:800;color:var(--text)}
.s-user-role{font-size:10px;color:var(--muted)}
.s-stats{display:flex;gap:5px;margin-top:8px}
.s-stat{flex:1;background:#fff;border-radius:8px;padding:4px 5px;text-align:center;border:1px solid var(--border)}
.s-stat-v{font-size:13px;font-weight:800;font-family:'Kanit',sans-serif}
.s-stat-l{font-size:9px;color:var(--muted)}
.s-nav{padding:8px}
.s-label{font-size:9px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;padding:6px 8px 3px}
.s-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:all .18s;color:var(--muted);font-size:12px;font-weight:600;user-select:none;position:relative}
.s-item:hover{background:var(--mint3);color:var(--mint)}
.s-item.act{background:linear-gradient(135deg,rgba(0,200,150,.12),rgba(56,189,248,.07));color:var(--mint);font-weight:700}
.s-item-ic{font-size:15px;width:20px;text-align:center}
.s-badge{margin-left:auto;background:linear-gradient(135deg,var(--mint),var(--sky));color:#fff;font-size:9px;padding:2px 6px;border-radius:9px;font-weight:800}
.s-red-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;padding:2px 6px;border-radius:9px;font-weight:800}
.prop-selector{display:flex;gap:4px;padding:8px 12px;border-bottom:1.5px solid var(--border)}
.prop-pill{flex:1;text-align:center;padding:4px 2px;border-radius:7px;font-size:10px;font-weight:800;cursor:pointer;border:1.5px solid transparent;transition:all .18s}

/* ══ CARDS ══ */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow2)}
.card-sm{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius2);padding:14px;box-shadow:var(--shadow2);transition:all .18s}
.card-sm:hover{border-color:var(--mint);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px;margin-bottom:12px}

/* ══ STAT CARDS ══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius2);padding:14px;text-align:center;position:relative;overflow:hidden}
.stat-val{font-size:22px;font-weight:800;font-family:'Kanit',sans-serif}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.stat-bar{position:absolute;bottom:0;left:0;right:0;height:3px}

/* ══ INPUTS & FORMS ══ */
.inp{background:#fff;border:1.5px solid var(--border);color:var(--text);padding:9px 13px;border-radius:10px;font-family:inherit;font-size:13px;width:100%;outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(0,200,150,.1)}
.inp option{background:#fff}
.form-g{margin-bottom:13px}
.form-lbl{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}

/* ══ BUTTONS ══ */
.btn{border:none;padding:8px 16px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--mint),var(--teal));color:#fff;box-shadow:0 3px 10px rgba(0,200,150,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(0,200,150,.35)}
.btn-sky{background:linear-gradient(135deg,var(--sky),var(--sky2));color:#fff}
.btn-outline{background:#fff;color:var(--mint);border:1.5px solid var(--mint)}
.btn-ghost{background:var(--mint3);color:var(--mint);font-weight:700}
.btn-ghost:hover{background:rgba(0,200,150,.15)}
.btn-danger{background:var(--red2);color:var(--red);border:1px solid #fecaca}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:8px}

/* ══ TAGS & BADGES ══ */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
.tg{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.ty{background:#fef9c3;color:#854d0e;border:1px solid #fde68a}
.tr{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.tb{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.ts{background:#e0f7ff;color:#0369a1;border:1px solid #bae6fd}
.tm{background:rgba(0,200,150,.1);color:var(--mint2);border:1px solid rgba(0,200,150,.25)}
.to{background:#ffedd5;color:#9a3412;border:1px solid #fed7aa}
.prop-tag{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:800;display:inline-flex;align-items:center}
.prop-CCH{background:rgba(0,200,150,.1);color:var(--mint2);border:1px solid rgba(0,200,150,.3)}
.prop-CHBR{background:rgba(56,189,248,.1);color:var(--sky2);border:1px solid rgba(56,189,248,.3)}
.prop-CWR{background:rgba(249,115,22,.1);color:#9a3412;border:1px solid rgba(249,115,22,.3)}
.prop-all{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}

/* ══ PROGRESS ══ */
.prog{height:7px;background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:10px;transition:width .9s ease}

/* ══ TABS & CHIPS ══ */
.tab-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:all .18s}
.tab:hover{border-color:var(--mint);color:var(--mint)}
.tab.act{background:linear-gradient(135deg,var(--mint),var(--teal));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,200,150,.22)}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:all .18s}
.chip.act{background:linear-gradient(135deg,var(--sky),var(--sky2));color:#fff;border-color:transparent}

/* ══ TABLE ══ */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1.5px solid var(--border)}
table{width:100%;border-collapse:collapse;background:#fff;min-width:500px}
th{background:linear-gradient(135deg,rgba(0,200,150,.06),rgba(56,189,248,.03));padding:9px 12px;text-align:left;font-size:10px;font-weight:800;color:var(--text2);border-bottom:1.5px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--bg2);font-size:12px;vertical-align:middle}
tr:hover td{background:rgba(0,200,150,.02)}
tr:last-child td{border-bottom:none}
.chk-col{width:36px;text-align:center}
input[type="checkbox"]{accent-color:var(--mint);width:14px;height:14px;cursor:pointer}

/* ══ MODAL ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,60,40,.4);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:14px}
.modal{background:#fff;border:2px solid var(--border);border-radius:18px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,100,60,.18)}
.modal.modal-wide{max-width:680px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1.5px solid var(--bg2)}
.modal-title{font-family:'Kanit',sans-serif;font-size:15px;font-weight:800;color:var(--text)}
.modal-x{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);transition:all .18s}
.modal-x:hover{background:var(--red2);border-color:var(--red);color:var(--red)}

/* ══ ALERTS ══ */
.alert-info{background:var(--sky3);border:1.5px solid rgba(56,189,248,.3);border-radius:10px;padding:9px 13px;font-size:12px;color:var(--sky2);margin-bottom:12px}
.alert-warn{background:#fffbeb;border:1.5px solid #fde68a;border-radius:10px;padding:9px 13px;font-size:12px;color:#92400e;margin-bottom:12px}
.tip-box{background:linear-gradient(135deg,rgba(0,200,150,.07),rgba(56,189,248,.04));border:1.5px solid var(--border2);border-radius:10px;padding:9px 13px;font-size:11px;color:var(--text2);margin-bottom:10px}

/* ══ PAGE HEADER ══ */
.ph{margin-bottom:18px}
.ph-row{display:flex;align-items:center;gap:11px}
.ph-ic{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--mint3),var(--sky3));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ph-title{font-family:'Kanit',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
.ph-sub{font-size:11px;color:var(--muted);margin-top:2px;margin-left:51px}
.back-row{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.back-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:11px;font-weight:700;transition:all .18s;font-family:inherit}
.back-btn:hover{border-color:var(--mint);color:var(--mint);background:var(--mint3)}
.back-btn:disabled{opacity:.4;cursor:default;pointer-events:none}

/* ══ EMPTY STATE ══ */
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-ic{font-size:36px;margin-bottom:8px}

/* ══ PHOTO UPLOAD ══ */
.photo-drop{border:2px dashed var(--border2);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .18s;background:var(--bg2)}
.photo-drop:hover{border-color:var(--mint);background:var(--mint3)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;margin-top:9px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;border:1.5px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-rm{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(239,68,68,.9);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#fff;font-weight:800}

/* ══ MISSION CARDS ══ */
.mission-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:15px;transition:all .18s;position:relative;overflow:hidden}
.mission-card:hover{border-color:var(--mint);transform:translateY(-2px);box-shadow:var(--shadow)}
.mc-top-bar{position:absolute;top:0;left:0;right:0;height:3px}
.mc-pts{font-family:'Kanit',sans-serif;font-size:18px;font-weight:800;color:var(--mint)}
.mc-title{font-size:12px;font-weight:800;color:var(--text);line-height:1.35;margin-bottom:4px;padding-top:4px}
.mc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:9px}
.mc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.mc-status{padding:7px;border-radius:8px;text-align:center;font-weight:700;font-size:11px}

/* ══ LEADERBOARD ══ */
.lb-podium{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin-bottom:20px;padding:10px 0}
.lb-pod{text-align:center;cursor:default}
.lb-bar{display:flex;align-items:flex-start;justify-content:center;padding-top:10px;border-radius:8px 8px 0 0}
.lb-row[data-staffdetail]:not(.lb-row-me):hover{background:var(--mint3);border-radius:9px;margin:-2px -10px;padding-left:10px!important;padding-right:10px!important;}

/* ══ FIREBASE STATUS ══ */
.fb-status{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}
.fb-connected{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.fb-local{background:#fef9c3;color:#854d0e;border-color:#fde68a}
.fb-error{background:#fee2e2;color:#991b1b;border-color:#fecaca}
.fb-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.fb-dot-on{background:#22c55e}
.fb-dot-off{background:#eab308}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ DOWNLOAD SELECTOR ══ */
.dl-selector{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.dl-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.dl-row:last-child{border-bottom:none}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  :root{--sidebar-w:240px}
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;display:none}
  .sidebar-overlay.show{display:block}
  .hamburger{display:flex}
  .tnav{display:none}
  .page-wrap{padding:14px}
  .form-row{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .lb-podium{gap:5px}
  table{min-width:420px}
}
@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:0 10px}
}

/* ══ MISC ══ */
.divider{height:1px;background:var(--bg2);margin:10px 0}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:13px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:11px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:10px}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
.initials{display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:800;font-family:'Kanit',sans-serif;background:linear-gradient(135deg,var(--mint),var(--teal));color:#fff;flex-shrink:0}
.saving-toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div id="app"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="saving-toast" id="savingToast" style="opacity:0;transform:translateY(10px)"></div>
<input type="file" id="photoInputGlobal" accept="image/*" multiple style="display:none">
<input type="file" id="importCsvInput" accept=".csv" style="display:none">

<script>
/* ══════════════════════════════════════════════════════════
   🔥 FIREBASE REALTIME DATABASE — CROSS-DEVICE SYNC
   ──────────────────────────────────────────────────────────
   ✅ Real-time sync across ALL devices (phone ↔ computer)
   ✅ Data persists forever in the cloud
   ✅ Works offline, syncs when back online

function updateFbStatusBadge(connected) {

// ── Bootstrap Firebase SDK dynamically ──
async function initFirebase() {
  if (!FIREBASE_READY) {
    console.warn('[GreenPulse] Firebase config not set — using localStorage');
    return false;
  }
  try {
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js');
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _firebaseDB = firebase.database();
    // Sign in anonymously so Firebase Rules (auth != null) are satisfied
    try {
      await firebase.auth().signInAnonymously();
      console.log('[GreenPulse] ✅ Firebase Auth: signed in anonymously');
    } catch(authErr) {
      console.warn('[GreenPulse] Anonymous auth failed (check Firebase console → Authentication → Enable Anonymous):', authErr.message);
    }
    // Quick connection test — write to .info/connected
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('Connection timeout after 8s')), 8000);
      _firebaseDB.ref('.info/connected').once('value', snap => {
        clearTimeout(timeout);
        if (snap.val() === true) {
          console.log('[GreenPulse] 🔥 Firebase Realtime DB connected!');
          resolve(true);
        } else {
          // Firebase loaded but offline — still try, will sync when online
          console.warn('[GreenPulse] Firebase loaded but currently offline — will sync when online');
          resolve(true);
        }
      }, err => { clearTimeout(timeout); reject(err); });
    });
    return true;
  } catch(e) {
    console.error('[GreenPulse] ❌ Firebase init failed:', e.message);
    console.error('→ Check: 1) databaseURL is correct  2) Rules allow read/write  3) Internet connection');
    return false;
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── Unified FB interface (Firebase OR localStorage fallback) ──
const FB = {
  _useFirebase: false,
  _remoteListenerOff: null,
  _connListenerOff: null,
  _reconnectTimer: null,
  _retryCount: 0,
  _maxRetry: 8,
  _deviceId: 'dev_' + Math.random().toString(36).slice(2, 10), // unique per tab/device
  _offlineQueue: null, // pending save when offline
  _isOnline: true,

  async init() {
    this._useFirebase = await initFirebase();
    updateFbStatusBadge(this._useFirebase);
    if (this._useFirebase) {
      this._attachListener();
      this._monitorConnection();
    } else {
      // Same-browser tab sync via BroadcastChannel
      if (_bc) _bc.onmessage = async (ev) => {
        if (ev.data?.type === 'sync') {
          await loadPersistedData();
          if (S.currentUser) render();
        }
      };
    }
  },

  // ── Attach real-time listener with error callback & reconnect ──
  _attachListener() {
    // Detach previous listener if any
    if (this._remoteListenerOff) {
      try { _firebaseDB.ref('greenpulse/data').off('value', this._remoteListenerOff); } catch(e) {}
      this._remoteListenerOff = null;
    }
    S._fbStatus = 'loading';
    const ref = _firebaseDB.ref('greenpulse/data');
    this._remoteListenerOff = ref.on(
      'value',
      snap => {
        // SUCCESS — reset retry counter
        this._retryCount = 0;
        clearTimeout(this._reconnectTimer);
        const wasError = S._fbStatus !== 'ok';
        S._fbStatus = 'ok';
        updateFbStatusBadge(true);
        const remote = snap.val();
        if (!remote || !remote.users) return;
        // Use device-unique ID to skip our own echo, not timestamp (timestamp skip breaks multi-device)
        if (remote._savedBy && remote._savedBy === FB._deviceId && Date.now() - remote._updatedAt < 3000) return;
        S._lastSaveTs = remote._updatedAt || 0;
        // Always apply remote data — Firebase is the single source of truth
        const prevUserId = S.currentUser?.id;
        const prevPage = S.page;
        const prevModal = S.modal;
        Object.assign(S, remote);
        // Restore local-only state
        S.page = prevPage;
        S.modal = prevModal;
        // Restore photos from local store for any submission missing them
        S.submissions = (S.submissions||[]).map(sub=>{
          if(!sub.photos || sub.photos.length===0){
            const stored = FB.getPhotos(sub.id);
            if(stored.length>0) return {...sub, photos:stored};
          }
          return sub;
        });
        if (prevUserId) {
          const fresh = S.users.find(u => u.id === prevUserId);
          if (fresh) S.currentUser = { ...S.currentUser, ...fresh };
          render();
        } else if (wasError) {
          render(); // re-render to remove error banner
        }
      },
      err => {
        // ERROR — listener failed, schedule reconnect
        console.warn('[GreenPulse] Listener error:', err.code, '— will reconnect');
        S._fbStatus = 'error';
        updateFbStatusBadge(false);
        this._scheduleReconnect();
      }
    );
  },

  // ── Monitor .info/connected — detects network-level disconnect ──
  _monitorConnection() {
    if (this._connListenerOff) {
      try { _firebaseDB.ref('.info/connected').off('value', this._connListenerOff); } catch(e) {}
    }
    this._connListenerOff = _firebaseDB.ref('.info/connected').on('value', snap => {
      const online = snap.val() === true;
      if (online) {
        this._isOnline = true;
        // Back online — reattach data listener if it was dropped
        if (S._fbStatus === 'error' || S._fbStatus === 'disconnected') {
          console.log('[GreenPulse] Reconnected — reattaching listener');
          this._retryCount = 0;
          clearTimeout(this._reconnectTimer);
          this._attachListener();
        }
        // Flush any saves that failed while offline
        this._flushQueue();
        S._fbStatus = 'ok';
        updateFbStatusBadge(true);
        if (S.currentUser && (S.page === 'admin')) render();
      } else {
        console.warn('[GreenPulse] Firebase disconnected');
        S._fbStatus = 'disconnected';
        updateFbStatusBadge(false);
        this._scheduleReconnect();
        if (S.currentUser && (S.page === 'admin')) render();
      }
    });
  },

  // ── Exponential backoff reconnect ──
  _scheduleReconnect() {
    clearTimeout(this._reconnectTimer);
    if (this._retryCount >= this._maxRetry) {
      console.error('[GreenPulse] Max reconnect attempts reached');
      return;
    }
    const delay = Math.min(1000 * Math.pow(2, this._retryCount), 30000); // max 30s
    this._retryCount++;
    console.log(`[GreenPulse] Reconnect attempt ${this._retryCount} in ${delay}ms`);
    this._reconnectTimer = setTimeout(() => {
      if (this._useFirebase && _firebaseDB) this._attachListener();
    }, delay);
  },

  async set(path, data) {
    if (this._useFirebase) {
      try {
        await _firebaseDB.ref(path).set(data);
        // If there was a queued save, it's now written — clear queue
        this._offlineQueue = null;
      } catch(e) {
        console.warn('[Firebase] set failed, saving locally + queuing:', e.message);
        this._localSet(path, data);
        // Queue for retry when back online
        this._offlineQueue = { path, data };
      }
    } else {
      this._localSet(path, data);
      try { _bc?.postMessage({ type: 'sync', path, ts: Date.now() }); } catch(e) {}
    }
  },

  // Flush queued save after coming back online
  async _flushQueue() {
    if (!this._offlineQueue) return;
    try {
      const { path, data } = this._offlineQueue;
      await _firebaseDB.ref(path).set(data);
      this._offlineQueue = null;
      console.log('[GreenPulse] ✅ Offline queue flushed');
    } catch(e) {
      console.warn('[GreenPulse] Queue flush failed:', e.message);
    }
  },

  async get(path) {
    if (this._useFirebase) {
      try {
        const snap = await _firebaseDB.ref(path).get();
        return snap.exists() ? snap.val() : null;
      } catch(e) {
        return this._localGet(path);
      }
    }
    return this._localGet(path);
  },

  // Photo storage always stays local (base64 too large for Firebase free tier)
  savePhotos(subId, photos) {
    try {
      const all = JSON.parse(localStorage.getItem(PHOTO_KEY) || '{}');
      all[subId] = photos;
      localStorage.setItem(PHOTO_KEY, JSON.stringify(all));
    } catch(e) { console.warn('[Photos] Storage full:', e.name); }
  },

  getPhotos(subId) {
    try {
      return JSON.parse(localStorage.getItem(PHOTO_KEY) || '{}')[subId] || [];
    } catch(e) { return []; }
  },

  getAllPhotos() {
    try { return JSON.parse(localStorage.getItem(PHOTO_KEY) || '{}'); } catch(e) { return {}; }
  },

  // Export full snapshot as JSON file
  exportSnapshot() {
    const data   = this._localGetAll();
    const photos = this.getAllPhotos();
    const blob   = new Blob([JSON.stringify({ data, photos, exportedAt: new Date().toISOString() })],
                            { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'greenpulse_backup_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
  },

  // Import snapshot from JSON file (any device)
  async importSnapshot(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = async e => {
        try {
          const { data, photos } = JSON.parse(e.target.result);
          if (photos) localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
          if (data) {
            if (this._useFirebase) {
              await _firebaseDB.ref('greenpulse/data').set(data);
            } else {
              localStorage.setItem(STORAGE_KEY, JSON.stringify({ 'greenpulse/data': data }));
            }
          }
          resolve(true);
        } catch(err) { reject(err); }
      };
      r.readAsText(file);
    });
  },

  // ── Local storage helpers ──
  _localGetAll() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
  },
  _localGet(path) {
    const full = this._localGetAll();
    return path.split('/').reduce((o, k) => (o && o[k] !== undefined ? o[k] : null), full);
  },
  _localSet(path, data) {
    const full = this._localGetAll();
    const parts = path.split('/');
    let obj = full;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = data;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(full)); } catch(e) {}
  },
};

/* ══════════════════════════════════════════════════════════
   PERSISTENCE LAYER
══════════════════════════════════════════════════════════ */
let _saveTimer=null;
let _pendingSave=false;
function schedSave(immediate=false){
  clearTimeout(_saveTimer);
  _pendingSave=true;
  showSavingToast();
  const delay = immediate ? 0 : 800;
  _saveTimer=setTimeout(async()=>{
    _pendingSave=false;
    await persistAll();
    showSavedToast();
  }, delay);
}

// Save immediately before page unload (prevents data loss on tab close)
window.addEventListener('beforeunload', ()=>{
  if(_pendingSave && S.currentUser){
    // Sync save attempt using sendBeacon as fallback
    const ts=Date.now();
    const data={users:S.users,teams:S.teams,departments:S.departments,missions:S.missions,
      submissions:S.submissions,notifications:S.notifications,deptLogs:S.deptLogs||[],
      _updatedAt:ts,_savedBy:FB._deviceId};
    // Always write to localStorage as backup
    try{
      const bk=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
      bk['greenpulse/data']=data;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(bk));
    }catch(e){}
  }
});

async function persistAll(){
  const ts = Date.now();
  const data={
    users:S.users,teams:S.teams,departments:S.departments,
    missions:S.missions,submissions:S.submissions,notifications:S.notifications,
    deptLogs:S.deptLogs||[],
    _updatedAt: ts,
    _savedBy: FB._deviceId, // used to skip echo on THIS device only
  };
  S._lastSaveTs = ts; // mark so listener skips this echo
  await FB.set('greenpulse/data',data);
  // Backup to localStorage always (offline safety net)
  try {
    const bk = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    bk['greenpulse/data'] = data;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bk));
  } catch(e) {}
}

async function loadPersistedData(){
  S._fbStatus = FB._useFirebase ? 'loading' : 'ok';
  try {
    // Try localStorage first for instant load (zero-wait), then Firebase will update via listener
    const localBk = FB._localGet('greenpulse/data');
    if(localBk && localBk.users && localBk.users.length > 0){
      Object.assign(S, localBk);
      S.deptLogs = localBk.deptLogs || [];
    }

    // Now fetch from Firebase (authoritative source)
    const saved = await FB.get('greenpulse/data');
    const best = (saved && saved._updatedAt && (!localBk || (saved._updatedAt > (localBk._updatedAt||0)))) ? saved : localBk;
    if(best && best.users && best.users.length>0){
      // Merge: use saved as base, add any DEFAULT users not present (by id)
      const mergedUsers = [...best.users];
      DEFAULT.users.forEach(du => {
        if (!mergedUsers.find(u => u.id === du.id)) mergedUsers.push(du);
      });
      // Merge departments too
      const mergedDepts = [...(best.departments||[])];
      DEFAULT.departments.forEach(dd => {
        if (!mergedDepts.find(d => d.id === dd.id)) mergedDepts.push(dd);
      });
      Object.assign(S, best);
      S.users = mergedUsers;
      S.departments = mergedDepts;
      S.deptLogs = best.deptLogs || [];
      S.submissions = (S.submissions||[]).map(sub=>{
        if(!sub.photos || sub.photos.length===0){
          const stored = FB.getPhotos(sub.id);
          if(stored.length>0) return {...sub, photos:stored};
        }
        return sub;
      });
      // If we added any missing data, push back to Firebase
      if(mergedUsers.length > best.users.length || mergedDepts.length > (best.departments||[]).length){
        await persistAll();
      }
    } else {
      Object.assign(S, JSON.parse(JSON.stringify(DEFAULT)));
      await persistAll();
    }
    S._fbStatus = 'ok';
  } catch(e) {
    console.warn('[GreenPulse] loadPersistedData failed:', e.message);
    // Fall back to DEFAULT so app is usable offline
    if (!S.users || S.users.length === 0) {
      Object.assign(S, JSON.parse(JSON.stringify(DEFAULT)));
    }
    S._fbStatus = 'error';
  }
}

function showSavingToast(){
  const el=document.getElementById('savingToast');
  if(el){el.innerHTML='⏳ '+t('saving');el.style.opacity='1';el.style.transform='translateY(0)';}
}
function showSavedToast(){
  const el=document.getElementById('savingToast');
  if(el){
    el.innerHTML='✅ '+t('saved');
    setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(10px)';},1200);
  }
}

function setState(patch, noSave=false){
  if(patch.modal && patch.modal!==null) S._modalOpenTime=Date.now()+200; // extra buffer
  Object.assign(S,patch);
  if(!noSave && S.currentUser){
    const dataKeys=['users','teams','departments','missions','submissions','notifications','deptLogs'];
    if(dataKeys.some(k=>k in patch)){
      // Immediate localStorage backup so data never lost on quick tab close
      try{
        const ts=Date.now();
        const bk=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
        bk['greenpulse/data']={users:S.users,teams:S.teams,departments:S.departments,
          missions:S.missions,submissions:S.submissions,notifications:S.notifications,
          deptLogs:S.deptLogs||[],_updatedAt:ts,_savedBy:FB._deviceId};
        localStorage.setItem(STORAGE_KEY,JSON.stringify(bk));
      }catch(e){}
      schedSave();
    }
  }
  render();
}

function navTo(page){
  if(S.page!==page){ S.prevPages=[...S.prevPages.slice(-9),S.page]; }
  setState({page,sideOpen:false},true);
}
function navBack(){
  if(S.prevPages.length>0){
    const p=S.prevPages[S.prevPages.length-1];
    S.prevPages=S.prevPages.slice(0,-1);
    setState({page:p},true);
  }
}

/* ══════════════════════════════════════════════════════════
   PAGE ROUTER
══════════════════════════════════════════════════════════ */
function renderPage(){
  switch(S.page){
    case 'dashboard': return S.currentUser.role==='staff'?renderStaffDash():renderAdminDash();
    case 'missions': return renderMissions();
    case 'leaderboard': return renderLeaderboard();
    case 'teams': return renderTeams();
    case 'reports': return renderReports();
    case 'profile': return renderProfile();
    case 'admin': return renderAdmin();
    case 'notifications': return renderNotifications();
    default: return S.currentUser.role==='staff'?renderStaffDash():renderAdminDash();
  }
}

// ── helpers ──
function propColor(p){return PROP_COLORS[p]||'#94a3b8';}
function propTag(p){
  if(!p||p==='all') return `<span class="prop-tag prop-all">All</span>`;
  return `<span class="prop-tag prop-${p}">${p}</span>`;
}
function isAdmin(){return S.currentUser&&(S.currentUser.role==='admin1'||S.currentUser.role==='admin2');}
function isSuper(){return S.currentUser&&S.currentUser.role==='admin1';}
function initials(name){return (name||'').split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('')||'?';}
function userInitDiv(u,size=30,fs=12){
  const pc=propColor(u?.property);
  return `<div class="initials" style="width:${size}px;height:${size}px;font-size:${fs}px;background:linear-gradient(135deg,${pc},${pc}cc)">${initials(u?.name)}</div>`;
}

// ── effective prop filter ──
function effectiveProp(){
  if(isSuper()) return S._superPropFilter==='all'?null:S._superPropFilter;
  if(S.currentUser.role==='admin2') return S.currentUser.property;
  return S.currentUser.property;
}

function visibleMissions(){
  const ep=effectiveProp();
  return S.missions.filter(m=>!ep||m.property===ep||m.property==='all');
}
function visibleUsers(){
  const ep=effectiveProp();
  return ep?S.users.filter(u=>u.property===ep||u.property==='all'):S.users;
}
function visibleTeams(){
  const ep=effectiveProp();
  return ep?S.teams.filter(t=>t.property===ep):S.teams;
}
function visibleSubs(){
  const ep=effectiveProp();
  if(!ep) return S.submissions;
  return S.submissions.filter(s=>{
    if(s.property) return s.property===ep;
    if(s.teamId){const tm=S.teams.find(t=>t.id===s.teamId);return tm?.property===ep;}
    const su=S.users.find(u=>u.id===s.userId);return su?.property===ep;
  });
}
function visibleDepts(){
  const ep=effectiveProp();
  return ep?S.departments.filter(d=>d.property===ep):S.departments;
}

/* ══════════════════════════════════════════════════════════
   MISSIONS
══════════════════════════════════════════════════════════ */
function renderMissions(){
  const u=S.currentUser;
  const mySubs=S.submissions.filter(s=>s.userId===u.id);
  const myTeamSubs=u.teamId?S.submissions.filter(s=>s.teamId===u.teamId):[];
  const missions=visibleMissions().filter(m=>{
    if(S.missionTab!=='all'&&m.period!==S.missionTab) return false;
    if(S.missionType==='individual'&&m.type!=='individual') return false;
    if(S.missionType==='team'&&m.type!=='team') return false;
    return true;
  });
  const getStatus=(mId,isTeam)=>isTeam&&u.teamId?myTeamSubs.find(s=>s.missionId===mId)?.status:mySubs.find(s=>s.missionId===mId)?.status;
  const getSubCount=(mId,isTeam)=>isTeam&&u.teamId?myTeamSubs.filter(s=>s.missionId===mId).length:mySubs.filter(s=>s.missionId===mId).length;
  return `<div>
    <div class="ph"><div class="ph-row"><div class="ph-ic">🎯</div><div><div class="ph-title">${t('missions')}</div></div></div>
    <div class="ph-sub">${missions.length} ภารกิจ • ${S.currentUser.property==='all'?'All Properties':S.currentUser.property}</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px;align-items:center">
      <div class="tab-row" style="margin-bottom:0">
        ${[['all',t('all')],['weekly','📆 '+t('weekly')],['monthly','📅 '+t('monthly')]].map(([k,l])=>`<button class="tab ${S.missionTab===k?'act':''}" data-mtab="${k}">${l}</button>`).join('')}
      </div>
      <div style="margin-left:auto;display:flex;gap:5px">
        ${[['all',t('all')],['individual','👤'],['team','👥']].map(([k,l])=>`<button class="chip ${S.missionType===k?'act':''}" data-mtype="${k}">${l}</button>`).join('')}
      </div>
    </div>
    <div class="mission-grid">
      ${missions.map(m=>{
        const isTeam=m.type==='team';
        const status=getStatus(m.id,isTeam);
        const subCount=getSubCount(m.id,isTeam);
        const maxSubs=m.submissionsPerPeriod||1;
        const dc=DIFF_COLOR[m.difficulty]||'var(--mint)';
        const pc2=PERIOD_COLOR[m.period]||'var(--mint)';
        const canAdd=!status||status==='rejected'||(m.period==='monthly'&&subCount<maxSubs&&status==='approved');
        return `<div class="mission-card">
          <div class="mc-top-bar" style="background:${pc2}"></div>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-top:4px">
            <div style="display:flex;gap:7px;flex:1">
              <div style="width:28px;height:28px;background:${pc2}18;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${isTeam?'👥':'👤'}</div>
              <div>
                <div class="mc-title">${S.lang==='th'?m.title:m.titleEn}</div>
                <div style="font-size:9px;color:var(--muted)">${m.code} • ${propTag(m.property)}</div>
              </div>
            </div>
            <div class="mc-pts">+${m.points}</div>
          </div>
          <div class="mc-desc">${S.lang==='th'?m.desc:m.descEn}</div>
          <div class="mc-tags">
            <span class="tag" style="background:${dc}18;color:${dc};border:1px solid ${dc}30">${m.difficulty}</span>
            <span class="tag" style="background:${pc2}14;color:${pc2==='#00c896'?'var(--mint2)':'var(--sky2)'};border:1px solid ${pc2}30">${m.period==='weekly'?'📆 '+t('weekly'):'📅 '+t('monthly')}</span>

          </div>

          ${status==='rejected'?`<div class="mc-status" style="background:#fee2e2;color:#991b1b;margin-bottom:7px">❌ ${t('rejected')}</div><button class="btn btn-primary" style="width:100%;justify-content:center" data-submit="${m.id}" data-isteam="${isTeam}">📤 ${t('submitProof')}</button>`:''}

      }).join('')}
    </div>
    ${missions.length===0?`<div class="empty"><div class="empty-ic">🎯</div>ไม่พบภารกิจ</div>`:''}

function renderLeaderboard(){
  const ep=effectiveProp();
  const staffList=[...S.users].filter(u=>u.role==='staff'&&(!ep||u.property===ep)).sort((a,b)=>b.points-a.points);
  const teamList=[...S.teams].filter(t=>!ep||t.property===ep).sort((a,b)=>b.points-a.points);
  const medals=['#eab308','#94a3b8','#c97b4b'];
  const list=S.lbTab==='individual'?staffList:teamList;
  const myId=S.currentUser.id;
  const myTeamId=S.currentUser.teamId;
  return `<div>
    <div class="ph"><div class="ph-row"><div class="ph-ic">🏆</div><div><div class="ph-title">${t('leaderboard')}</div></div></div></div>
    <div class="tab-row">
      <button class="tab ${S.lbTab==='individual'?'act':''}" data-lbtab="individual">👤 Individual</button>
      <button class="tab ${S.lbTab==='team'?'act':''}" data-lbtab="team">👥 Team</button>
    </div>
    ${isSuper()?`<div class="chip-row" style="margin-bottom:12px">
      ${['all','CCH','CHBR','CWR'].map(p=>`<button class="chip ${S._superPropFilter===p?'act':''}" data-superprop="${p}">${p==='all'?'🌐 ทั้งหมด':p}</button>`).join('')}
    </div>`:''}
    ${S.lbTab==='individual'&&staffList.length>=3?`
    <div class="lb-podium">
      ${/* podiumOrder[i] = which staffList index to show in display slot i (left=2nd, center=1st, right=3rd) */
      [1,0,2].map((staffIdx,displayPos)=>{
        const uu=staffList[staffIdx]; if(!uu) return '';
        const rank=staffIdx+1; // rank 1=gold,2=silver,3=bronze
        const mc=medals[staffIdx]; // medals[0]=gold medals[1]=silver medals[2]=bronze
        const barH=displayPos===1?138:displayPos===0?108:88; // center=tallest
        const medalIc=['🥇','🥈','🥉'][staffIdx];
        return `<div class="lb-pod" data-staffdetail="${uu.id}" style="cursor:pointer" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
          ${userInitDiv(uu,40,16)}
          <div style="font-size:11px;font-weight:800;margin:4px 0 2px;max-width:82px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${uu.name.split(' ')[0]}</div>
          ${propTag(uu.property)}
          <div style="font-size:12px;font-weight:800;color:${mc};margin:4px 0;font-family:'Kanit',sans-serif">${uu.points.toLocaleString()} pts</div>
          <div class="lb-bar" style="height:${barH}px;width:82px;background:${mc}18;border:1.5px solid ${mc}55;border-radius:8px 8px 0 0">
            <div style="text-align:center;padding-top:8px">
              <div style="font-size:26px;font-weight:900;color:${mc};font-family:'Kanit',sans-serif;line-height:1">${rank}</div>
              <div style="font-size:11px;margin-top:2px">${medalIc}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
    <div class="card">
      ${list.map((item,i)=>{
        const isMe=S.lbTab==='individual'?item.id===myId:(myTeamId&&item.id===myTeamId);
        return `<div ${S.lbTab==='individual'?`data-staffdetail="${item.id}"`:''} class="lb-row${isMe?' lb-row-me':''}" style="display:flex;align-items:center;gap:10px;padding:10px ${isMe?'10px':'0'};border-bottom:${i<list.length-1?'1px solid var(--bg2)':'none'};${isMe?'background:var(--mint3);border-radius:9px;margin:2px -10px;':''}${S.lbTab==='individual'?'cursor:pointer;':''}transition:background .15s">
          <div style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900;font-family:'Kanit',sans-serif;font-size:${i<3?14:11}px;background:${i===0?'linear-gradient(135deg,#fbbf24,#d97706)':i===1?'linear-gradient(135deg,#e2e8f0,#94a3b8)':i===2?'linear-gradient(135deg,#fcd9a0,#c97b4b)':'var(--bg2)'};color:${i<3?'#fff':'var(--muted)'};box-shadow:${i<3?'0 2px 6px rgba(0,0,0,.15)':'none'}">
            ${i+1}
          </div>
          ${S.lbTab==='individual'?userInitDiv(item,32,12):`<div style="width:32px;height:32px;border-radius:9px;background:var(--sky3);display:flex;align-items:center;justify-content:center;font-size:16px">👥</div>`}
          <div style="flex:1">
            <div style="font-size:12px;font-weight:${isMe?800:600}">${item.name}${isMe?' 👈':''}</div>
            <div style="display:flex;gap:5px;margin-top:2px;flex-wrap:wrap;align-items:center">
              ${propTag(item.property)}
              ${S.lbTab==='individual'?`<span style="font-size:10px;color:var(--muted)">🔥 ${item.streak}d</span>`:''}
              ${S.lbTab==='individual'?item.badges.map(b=>`<span class="tag tm" style="font-size:9px">🏅 ${b}</span>`).join(''):''}
            </div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:5px">
            <div><div style="font-size:15px;font-weight:800;color:${i<3?medals[i]:'var(--mint)'};font-family:'Kanit',sans-serif">${item.points.toLocaleString()}</div>
            <div style="font-size:9px;color:var(--muted)">pts</div></div>
            ${S.lbTab==='individual'?`<span style="font-size:14px;color:var(--muted);margin-left:2px">›</span>`:''}
          </div>
        </div>`;
      }).join('')}
      ${list.length===0?`<div class="empty"><div class="empty-ic">🏆</div>ไม่มีข้อมูล</div>`:''}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   REPORTS — with selective export
══════════════════════════════════════════════════════════ */
function renderReports(){
  const props=isSuper()?['all','CCH','CHBR','CWR']:[S.currentUser.property];
  const ep=S.reportProp==='all'&&isSuper()?null:S.reportProp;
  let vSubs=ep?S.submissions.filter(s=>s.property===ep||(S.users.find(u=>u.id===s.userId)?.property===ep)):S.submissions;
  if(S.reportPeriod!=='all') vSubs=vSubs.filter(s=>{const m=S.missions.find(x=>x.id===s.missionId);return m?.period===S.reportPeriod;});
  // Date range filter
  if(S.reportDateFrom) vSubs=vSubs.filter(s=>s.submittedAt>=S.reportDateFrom);
  if(S.reportDateTo) vSubs=vSubs.filter(s=>s.submittedAt<=S.reportDateTo);
  const fSubs=vSubs;

  // Build selection state
  if(!S._dlSelected) S._dlSelected={users:true,teams:true,missions:true,submissions:true,photos:true};

  const allTeams=ep?S.teams.filter(t=>t.property===ep):S.teams;
  const allStaff=ep?S.users.filter(u=>u.property===ep&&u.role==='staff'):S.users.filter(u=>u.role==='staff');

  return `<div>
    <div class="ph"><div class="ph-row"><div class="ph-ic">📈</div><div><div class="ph-title">${t('reports')}</div></div></div></div>
    <!-- Filters -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center">
      <div class="chip-row" style="margin-bottom:0">
        ${props.map(p=>`<button class="chip ${S.reportProp===p?'act':''}" data-rprop="${p}">${p==='all'?'🌐 All':p}</button>`).join('')}
      </div>
      <div class="chip-row" style="margin-bottom:0">
        ${[['all',t('all')],['weekly',t('weekly')],['monthly',t('monthly')]].map(([k,l])=>`<button class="chip ${S.reportPeriod===k?'act':''}" data-rperiod="${k}">${l}</button>`).join('')}
      </div>
    </div>
    <!-- Date Range Filter -->
    <div class="card" style="margin-bottom:14px;padding:14px">
      <div class="card-title">📅 กรองตามช่วงวันที่</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-g" style="margin-bottom:0;flex:1;min-width:130px">
          <label class="form-lbl">จากวันที่</label>
          <input class="inp" type="date" id="rpt-from" value="${S.reportDateFrom||''}">
        </div>
        <div class="form-g" style="margin-bottom:0;flex:1;min-width:130px">
          <label class="form-lbl">ถึงวันที่</label>
          <input class="inp" type="date" id="rpt-to" value="${S.reportDateTo||''}">
        </div>
        <button class="btn btn-ghost btn-sm" id="rpt-apply-date">🔍 กรอง</button>
        <button class="btn btn-outline btn-sm" id="rpt-clear-date">✕ ล้าง</button>
      </div>
      ${S.reportDateFrom||S.reportDateTo?`<div style="font-size:10px;color:var(--mint);margin-top:7px;font-weight:700">📌 กรอง: ${S.reportDateFrom||'ตั้งแต่ต้น'} → ${S.reportDateTo||'ถึงปัจจุบัน'} (${fSubs.length} รายการ)</div>`:''}
    </div>
    <!-- Stats -->
    <div class="stat-grid" style="margin-bottom:16px">
      ${[['📋',fSubs.length,'ทั้งหมด','var(--sky2)'],['✅',fSubs.filter(s=>s.status==='approved').length,'อนุมัติ','var(--mint)'],['⏳',fSubs.filter(s=>s.status==='pending').length,'รอตรวจ','var(--yellow)'],['❌',fSubs.filter(s=>s.status==='rejected').length,'ไม่ผ่าน','var(--red)']].map(([ic,v,l,c])=>`
        <div class="stat-card"><div style="font-size:20px;margin-bottom:3px">${ic}</div><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div><div class="stat-bar" style="background:${c}"></div></div>`).join('')}
    </div>
    <!-- Download Excel selector -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">📊 ดาวน์โหลด Excel</div>
      <div class="dl-selector">
        ${[['users','👤 พนักงาน'],['teams','👥 ทีม'],['missions','🎯 ภารกิจ'],['submissions','📋 งานที่ส่ง'],['photos','📷 รูปภาพ (ZIP)']].map(([k,l])=>`
          <div class="dl-row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600">
              <input type="checkbox" id="dl-${k}" ${S._dlSelected[k]?'checked':''} style="accent-color:var(--mint)">
              ${l}
            </label>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" data-action="downloadExcel">📊 ${t('downloadExcel')}</button>
        <button class="btn btn-sky" data-action="downloadPhotos">📦 ${t('downloadPhotos')}</button>
      </div>
    </div>
    <!-- PDF Export selector -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">📄 ดาวน์โหลด PDF (เลือกได้)</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <div class="form-g" style="flex:1;min-width:130px;margin-bottom:0">
          <label class="form-lbl">🏢 เลือกทีม</label>
          <select class="inp" id="pdf-team-filter">
            <option value="all">— ทั้งหมด —</option>
            ${allTeams.map(tm=>`<option value="${tm.id}">${tm.name} (${tm.property})</option>`).join('')}
          </select>
        </div>
        <div class="form-g" style="flex:1;min-width:130px;margin-bottom:0">
          <label class="form-lbl">👤 เลือกบุคคล</label>
          <select class="inp" id="pdf-user-filter">
            <option value="all">— ทั้งหมด —</option>
            ${allStaff.map(u=>`<option value="${u.id}">${u.name} (${u.property})</option>`).join('')}
          </select>
        </div>
        <div class="form-g" style="flex:1;min-width:130px;margin-bottom:0">
          <label class="form-lbl">🏨 เลือกสาขา</label>
          <select class="inp" id="pdf-prop-filter">
            <option value="all">— ทั้งหมด —</option>
            ${['CCH','CHBR','CWR'].map(p=>`<option value="${p}">${p}</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-danger" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none" data-action="downloadPDF">📄 ดาวน์โหลด PDF</button>
        <button class="btn btn-ghost btn-sm" data-action="downloadLeaderboardPDF">🏆 PDF Leaderboard</button>
      </div>
    </div>
    <!-- Per-property breakdown -->
    ${isSuper()?`<div class="card" style="margin-bottom:14px">
      <div class="card-title">🏨 สรุปรายสาขา</div>
      ${['CCH','CHBR','CWR'].map(pid=>{
        const pSubs=fSubs.filter(s=>s.property===pid||(S.users.find(u=>u.id===s.userId)?.property===pid));
        const pct=pSubs.length?Math.round((pSubs.filter(s=>s.status==='approved').length/pSubs.length)*100):0;
        const pc=propColor(pid);
        return `<div style="margin-bottom:11px;padding:11px;background:${pc}07;border:1.5px solid ${pc}22;border-radius:11px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <div style="font-weight:800;color:${pc};font-size:14px;font-family:'Kanit',sans-serif">${pid}</div>
            <span style="color:${pct>=70?'var(--mint)':pct>=40?'var(--yellow)':'var(--red)'};font-weight:700">${pct}%</span>
          </div>
          <div class="prog" style="margin-bottom:5px"><div class="prog-fill" style="width:${pct}%;background:${pc}"></div></div>
          <div style="font-size:10px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap">
            <span>✅ ${pSubs.filter(s=>s.status==='approved').length}</span>
            <span>⏳ ${pSubs.filter(s=>s.status==='pending').length}</span>
            <span>📸 ${pSubs.reduce((a,s)=>a+(s.photos?.length||0),0)} รูป</span>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
    <!-- Submissions list -->
    <div class="card">
      <div class="card-title">📋 รายการส่งงาน (${fSubs.length})</div>
      ${fSubs.map((sub,i)=>{
        const uu=S.users.find(x=>x.id===sub.userId);
        const tm=sub.teamId?S.teams.find(t=>t.id===sub.teamId):null;
        const m=S.missions.find(x=>x.id===sub.missionId);
        return `<div style="padding:11px 0;border-bottom:${i<fSubs.length-1?'1px solid var(--bg2)':'none'}">
          <div style="display:flex;align-items:flex-start;gap:9px;margin-bottom:6px">
            ${userInitDiv(uu,28,11)}
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700">${tm?tm.name:uu?.name} ${propTag(tm?tm.property:uu?.property)}</div>
              <div style="font-size:10px;color:var(--muted)">⚡ ${S.lang==='th'?m?.title:m?.titleEn} • ${sub.submittedAt}</div>
              ${sub.note?`<div style="font-size:10px;color:var(--text2);background:var(--bg2);padding:4px 8px;border-radius:7px;margin-top:4px">📝 ${sub.note}</div>`:''}
            </div>
            <span class="tag ${sub.status==='approved'?'tg':sub.status==='pending'?'ty':'tr'}">${t(sub.status)}</span>
          </div>
        </div>`;
      }).join('')}
      ${fSubs.length===0?`<div class="empty"><div class="empty-ic">📋</div>ไม่มีข้อมูล</div>`:''}
    </div>
  </div>`;
}

        <div class="stat-card"><div style="font-size:20px;margin-bottom:3px">${ic}</div><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div><div class="stat-bar" style="background:${c}"></div></div>`).join('')}

      <div style="display:flex;align-items:center;gap:12px">

        <div style="flex:1">
          <div style="font-weight:800;font-size:14px">${myTeam.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${myTeam.property} • ${myTeam.points.toLocaleString()} pts</div>

        return `<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:${i<mySubs.length-1?'1px solid var(--bg2)':'none'}">

}

   ADMIN

function renderAdmin(){

  const tabs=[['submissions','📋',t('review')],['users','👤',t('manageUsers')],['missions','🎯','ภารกิจ'],['teams','👥',t('manageTeams')],['departments','🏢',t('manageDepts')]];

    ${!isSuper()?`<div class="alert-info">🔒 Property Admin: จัดการข้อมูลของ <strong>${u.property}</strong> เท่านั้น</div>`:''}
    <div class="tab-row">
      ${tabs.map(([k,ic,l])=>`<button class="tab ${S.adminTab===k?'act':''}" data-atab="${k}">${ic} ${l}</button>`).join('')}
    </div>
    ${S.adminTab==='submissions'?renderAdminSubs():''}
    ${S.adminTab==='users'?renderAdminUsers():''}
    ${S.adminTab==='missions'?renderAdminMissions():''}
    ${S.adminTab==='teams'?renderAdminTeams():''}
    ${S.adminTab==='departments'?renderAdminDepts():''}
  </div>`;
}

function renderAdminSubs(){
  const allSubs=visibleSubs();
  const filterSt=S._subFilter||'pending';
  const subs=filterSt==='all'?allSubs:allSubs.filter(s=>s.status===filterSt);
  const pending=allSubs.filter(s=>s.status==='pending').length;
  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px">
      <div style="font-weight:800;color:var(--text)">📋 ${t('review')}</div>
      <div class="chip-row" style="margin-bottom:0">
        ${[['pending','⏳ รอตรวจ ('+pending+')'],['approved','✅ ผ่าน'],['rejected','❌ ไม่ผ่าน'],['all','📋 ทั้งหมด']].map(([k,l])=>`<button class="chip ${filterSt===k?'act':''}" data-subfilter="${k}">${l}</button>`).join('')}
      </div>
    </div>
    <div class="card">
      ${subs.map((sub,i)=>{
        const uu=S.users.find(x=>x.id===sub.userId);
        const tm=sub.teamId?S.teams.find(t=>t.id===sub.teamId):null;
        const m=S.missions.find(x=>x.id===sub.missionId);
        return `<div style="padding:13px 0;border-bottom:${i<subs.length-1?'1px solid var(--bg2)':'none'}">
          <div style="display:flex;gap:10px;align-items:flex-start">
            ${userInitDiv(uu,30,12)}
            <div style="flex:1;min-width:0">
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:3px">
                <span style="font-size:12px;font-weight:800">${tm?tm.name:uu?.name}</span>
                ${propTag(tm?tm.property:uu?.property)}
                <span class="tag ${sub.status==='approved'?'tg':sub.status==='pending'?'ty':'tr'}">${t(sub.status)}</span>
              </div>
              <div style="font-size:10px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span>⚡ ${S.lang==='th'?m?.title:m?.titleEn}</span>
                <span style="color:var(--dim)">•</span>
                <span>${m?.code||''}</span>
                <span style="color:var(--dim)">•</span>
                <span>${sub.submittedAt}</span>
                ${(()=>{const pc=(sub.photos&&sub.photos.length>0?sub.photos:FB.getPhotos(sub.id)).length;
                  return pc>0?`<span style="background:var(--mint3);color:var(--mint2);border:1px solid var(--border2);border-radius:20px;padding:1px 7px;font-size:9px;font-weight:800">📷 ${pc} รูป</span>`:'<span style="color:var(--dim);font-size:9px">📷 ไม่มีรูป</span>';
                })()}
              </div>
              ${sub.note?`<div style="font-size:11px;color:var(--text2);background:var(--bg2);padding:5px 9px;border-radius:8px;margin-bottom:6px;word-break:break-word">📝 ${sub.note}</div>`:''}
              ${sub.adminNote?`<div style="font-size:10px;color:var(--orange);margin-bottom:4px">💬 ${sub.adminNote}</div>`:''}
              ${(()=>{
                // Restore photos from photo store if missing from state
                let ph2=sub.photos&&sub.photos.length>0?sub.photos:FB.getPhotos(sub.id);
                if(ph2.length>0){
                  return `<div style="margin-bottom:8px">
                    <div style="font-size:10px;font-weight:800;color:var(--mint2);margin-bottom:6px;display:flex;align-items:center;gap:5px">
                      📷 รูปหลักฐาน
                      <span style="background:var(--mint3);color:var(--mint2);border:1px solid var(--border2);border-radius:20px;padding:1px 8px;font-size:10px">${ph2.length} รูป</span>
                      <button onclick="event.stopPropagation();openPhotoViewer('${sub.id}',0)"
                        style="margin-left:auto;padding:2px 10px;border-radius:20px;border:1.5px solid var(--mint);background:var(--mint3);color:var(--mint2);font-size:10px;font-weight:700;cursor:pointer">
                        ดูทั้งหมด →
                      </button>
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap">
                      ${ph2.map((ph,pi)=>`
                        <div onclick="event.stopPropagation();openPhotoViewer('${sub.id}',${pi})"
                          style="width:80px;height:80px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .15s;flex-shrink:0;position:relative"
                          onmouseover="this.style.borderColor='var(--mint)';this.style.transform='scale(1.05)'"
                          onmouseout="this.style.borderColor='var(--border)';this.style.transform='scale(1)'">
                          <img src="${ph}" style="width:100%;height:100%;object-fit:cover">
                          ${pi===0&&ph2.length>1?`<div style="position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border-radius:5px;padding:1px 5px;font-size:9px;font-weight:700">+${ph2.length}</div>`:''}
                        </div>`).join('')}
                    </div>
                  </div>`;
                } else {
                  return `<div style="font-size:10px;color:var(--dim);background:var(--bg2);border-radius:7px;padding:5px 9px;margin-bottom:6px;display:inline-flex;align-items:center;gap:4px">📷 ไม่มีรูปภาพแนบ</div>`;
                }
              })()}
            </div>
            ${sub.status==='pending'?`<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
              <button class="btn btn-primary btn-xs" data-approvsub="${sub.id}">${t('approveBtn')}</button>
              <button class="btn btn-danger btn-xs" data-rejectsub="${sub.id}">${t('rejectBtn')}</button>
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
      ${subs.length===0?`<div class="empty"><div class="empty-ic">📋</div>ไม่มีรายการ</div>`:''}
    </div>
  </div>`;
}

function renderAdminUsers(){
  // ── Loading / error boundary ──
  if (S._fbStatus === 'loading' && (!S.users || S.users.length === 0)) {
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;gap:12px">
      <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--mint);border-radius:50%;animation:spin .8s linear infinite"></div>
      <div style="font-size:13px;color:var(--muted)">กำลังโหลดข้อมูลจาก Firebase...</div>
    </div>`;
  }
  const users=visibleUsers().filter(u=>u.id!==S.currentUser.id||isSuper());
  const disconnectedBanner = (S._fbStatus === 'error' || S._fbStatus === 'disconnected') ? `
    <div style="background:#fff1f2;border:1.5px solid #fecaca;border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="flex:1">
        <div style="font-weight:700;color:#b91c1c;font-size:12px">⚠️ ขาดการเชื่อมต่อ Firebase — ข้อมูลอาจไม่ใช่ล่าสุด</div>
      </div>
      <button onclick="FB._retryCount=0;FB._attachListener();FB._monitorConnection()" style="padding:5px 14px;border-radius:7px;border:1.5px solid #fca5a5;background:#fee2e2;color:#b91c1c;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">🔄 ลองใหม่</button>
    </div>` : '';
  return `<div>
    ${disconnectedBanner}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:7px">
      <div style="font-weight:800">👤 พนักงาน (${users.length})</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" data-action="dlStaffTemplate">📥 ${t('staffTemplate')}</button>
        <button class="btn btn-sky btn-sm" data-action="importStaff">📤 ${t('importStaff')}</button>
        <button class="btn btn-primary btn-sm" data-action="addUser">➕ เพิ่ม</button>
      </div>
    </div>
    ${_renderUserTable(users)}
  </div>`;
}

function _renderUserTable(users){
  // Build set of valid dept names per property for quick lookup
  const validDepts={};
  ['CCH','CHBR','CWR'].forEach(p=>{
    validDepts[p]=new Set(S.departments.filter(d=>d.property===p).map(d=>d.name));
  });
  return `<div class="tbl-wrap">
    <table>
      <thead><tr>${['ชื่อ','Username','Property','แผนก','Role','คะแนน','สถานะ',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>
        ${users.map(uu=>{
          const prop=uu.property==='all'?null:uu.property;
          const deptValid=!prop||validDepts[prop]?.has(uu.dept);
          return `<tr>
            <td><div style="display:flex;align-items:center;gap:8px">${userInitDiv(uu,26,10)}<span style="font-weight:700;font-size:12px">${uu.name}</span></div></td>
            <td style="color:var(--muted);font-size:11px;font-family:monospace">${uu.username}</td>
            <td>${propTag(uu.property==='all'?'all':uu.property)}</td>
            <td>
              <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;${deptValid?'color:var(--text2)':'color:var(--red);font-weight:700'}">
                ${uu.dept||'—'}
                ${!deptValid&&uu.dept?`<span title="แผนกนี้ไม่มีในระบบ" style="background:var(--red2);color:var(--red);border-radius:4px;padding:0 4px;font-size:9px;font-weight:800">!</span>`:''}
              </span>
            </td>
            <td><span class="tag ${uu.role==='admin1'?'tr':uu.role==='admin2'?'ts':'tg'}">${t('role_'+uu.role)}</span></td>
            <td style="font-weight:800;color:var(--mint);font-family:'Kanit',sans-serif">${uu.points.toLocaleString()}</td>
            <td><span class="tag ${uu.active?'tg':'tr'}">${uu.active?t('active'):t('inactive')}</span></td>
            <td><div style="display:flex;gap:4px">
              <button class="btn btn-ghost btn-xs btn-icon" data-edituser="${uu.id}" title="Edit">✏️</button>
              ${uu.id!==S.currentUser?.id?`<button class="btn btn-danger btn-xs btn-icon" data-toggleuser="${uu.id}" title="Toggle">${uu.active?'🔒':'🔓'}</button>`:''}
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderAdminTeams(){

      <div style="font-weight:800">👥 ทีม (${teams.length})</div>

          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

              <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0">${(em.name[0]||'?').toUpperCase()}</div>
              <span style="font-size:10px;font-weight:600;color:#9a3412">${em.name.split(' ')[0]}</span>

          </div>
          ${(team.externalMembers||[]).length>0?`<div style="font-size:9px;color:var(--muted);margin-top:3px">🌐 ภายนอก: ${(team.externalMembers||[]).map(em=>em.name).join(', ')}</div>`:''}
          <div style="font-size:14px;font-weight:800;color:${pc};font-family:'Kanit',sans-serif;margin-top:7px">${team.points.toLocaleString()} pts</div>

function renderAdminDepts(){
  const depts=visibleDepts();
  const logs=(S.deptLogs||[]).filter(l=>{
    if(!isSuper()&&S.currentUser.property) return l.property===S.currentUser.property;
    return true;
  });
  const actionLabel={create:'➕ สร้าง',edit:'✏️ แก้ไข',delete:'🗑️ ลบ'};
  const actionColor={create:'var(--mint)',edit:'var(--sky2)',delete:'var(--red)'};
  const actionBg={create:'rgba(0,200,150,.08)',edit:'rgba(56,189,248,.08)',delete:'rgba(239,68,68,.07)'};

  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
      <div style="font-weight:800">🏢 แผนก (${depts.length})</div>
      <button class="btn btn-primary btn-sm" data-action="addDept">➕ เพิ่มแผนก</button>
    </div>
    <div class="tbl-wrap" style="margin-bottom:20px">
      <table>
        <thead><tr>${['ชื่อแผนก','Property',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>
          ${depts.map(d=>`<tr>
            <td style="font-weight:700">${d.name}</td>
            <td>${propTag(d.property)}</td>
            <td><div style="display:flex;gap:4px">
              <button class="btn btn-ghost btn-xs btn-icon" data-editdept="${d.id}">✏️</button>
              <button class="btn btn-danger btn-xs btn-icon" data-deletedept="${d.id}">🗑️</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- ── Audit Log ── -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-size:13px;font-weight:800;color:var(--text)">📋 ประวัติการเปลี่ยนแปลงแผนก</div>
      <span style="font-size:10px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;color:var(--muted);font-weight:700">${logs.length} รายการ</span>
    </div>
    ${logs.length===0
      ? `<div style="text-align:center;padding:28px;color:var(--muted);background:var(--bg2);border-radius:12px;border:1.5px dashed var(--border)">
          <div style="font-size:24px;margin-bottom:6px">📋</div>
          <div style="font-size:12px">ยังไม่มีประวัติการเปลี่ยนแปลง</div>
        </div>`
      : `<div style="display:flex;flex-direction:column;gap:6px">
          ${logs.map(l=>{
            const dt=new Date(l.at);
            const dateStr=dt.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'});
            const timeStr=dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
            const actor=S.users.find(u=>u.id===l.byId);
            const actorInitials=(actor?.name||l.by||'?').split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('');
            const pc=PROP_COLORS[l.property]||'#94a3b8';
            return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 13px;background:${actionBg[l.action]||'#f8fafc'};border:1.5px solid ${l.action==='delete'?'rgba(239,68,68,.15)':l.action==='edit'?'rgba(56,189,248,.15)':'rgba(0,200,150,.15)'};border-radius:10px">
              <div style="width:28px;height:28px;border-radius:8px;background:${actionBg[l.action]};border:1.5px solid ${actionColor[l.action]}44;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">${actionLabel[l.action]?.split(' ')[0]||'📝'}</div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
                  <span style="font-size:11px;font-weight:800;color:${actionColor[l.action]}">${actionLabel[l.action]||l.action}</span>
                  <span style="font-size:12px;font-weight:700;color:var(--text)">${l.deptName}</span>
                  <span style="display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:800;background:${pc}15;color:${pc};border:1px solid ${pc}40">${l.property}</span>
                  ${l.action==='edit'&&(l.oldName!==l.deptName||l.oldProperty!==l.property)?`<span style="font-size:10px;color:var(--muted)">(จาก "${l.oldName||'?'}" ${l.oldProperty||'?'})</span>`:''}
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <div style="display:flex;align-items:center;gap:4px">
                    <div style="width:16px;height:16px;border-radius:5px;background:linear-gradient(135deg,${pc},${pc}bb);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0">${actorInitials}</div>
                    <span style="font-size:10px;color:var(--muted);font-weight:600">${l.by}</span>
                  </div>
                  <span style="font-size:10px;color:var(--dim)">•</span>
                  <span style="font-size:10px;color:var(--dim)">${dateStr} ${timeStr}</span>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>`
    }
  </div>`;
}

        <div style="flex:1"><div style="font-size:12px;font-weight:${n.read?500:700};color:${n.read?'var(--muted)':'var(--text)'}">${S.lang==='th'?n.msg:n.msgEn}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">📅 ${n.time}</div></div>
        ${!n.read?`<div style="width:8px;height:8px;background:var(--mint);border-radius:50%;flex-shrink:0;margin-top:5px;animation:pulse 2s infinite"></div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

let _pendingPhotos=[];

  pv.innerHTML=`<div class="photo-grid">${_pendingPhotos.map((ph,i)=>`<div class="photo-thumb"><img src="${ph}"><div class="photo-rm" onclick="event.stopPropagation();_pendingPhotos.splice(${i},1);updatePhotoPreview()">✕</div></div>`).join('')}</div>`;
}

/* ══════════════════════════════════════════════════════════
   EXCEL EXPORT — Multi-sheet via SheetJS
══════════════════════════════════════════════════════════ */
function exportExcel(){
  const sel=S._dlSelected||{users:true,teams:true,missions:true,submissions:true};
  const ep=S.reportProp==='all'&&isSuper()?null:S.reportProp;
  let vSubs=ep?S.submissions.filter(s=>s.property===ep):S.submissions;
  if(S.reportPeriod!=='all') vSubs=vSubs.filter(s=>{const m=S.missions.find(x=>x.id===s.missionId);return m?.period===S.reportPeriod;});
  if(S.reportDateFrom) vSubs=vSubs.filter(s=>s.submittedAt>=S.reportDateFrom);
  if(S.reportDateTo) vSubs=vSubs.filter(s=>s.submittedAt<=S.reportDateTo);
  const fSubs=vSubs;
  const wb=XLSX.utils.book_new();

  // Sheet 1: Staff
  if(sel.users){
    const vUsers=ep?S.users.filter(u=>u.property===ep):S.users;
    const staffData=[['Username','Name','Property','Department','Role','Points','Streak','Badges','Status','Team']];
    vUsers.forEach(u=>{
      const teamName=S.teams.find(t=>t.id===u.teamId)?.name||'';
      staffData.push([u.username,u.name,u.property,u.dept,u.role,u.points,u.streak,u.badges.join(';'),u.active?'Active':'Inactive',teamName]);
    });
    const ws1=XLSX.utils.aoa_to_sheet(staffData);
    ws1['!cols']=[{wch:15},{wch:25},{wch:8},{wch:20},{wch:14},{wch:8},{wch:8},{wch:25},{wch:10},{wch:20}];
    XLSX.utils.book_append_sheet(wb,ws1,'Staff');
  }

  // Sheet 2: Teams
  if(sel.teams){
    const vTeams=ep?S.teams.filter(t=>t.property===ep):S.teams;
    const teamData=[['Team Name','Property','Members','Departments','Points','Streak']];
    vTeams.forEach(tm=>{
      const members=S.users.filter(u=>tm.memberIds?.includes(u.id));
      teamData.push([tm.name,tm.property,members.map(m=>m.name).join('; '),tm.depts?.join('; ')||'',tm.points,tm.streak||0]);
    });
    const ws2=XLSX.utils.aoa_to_sheet(teamData);
    ws2['!cols']=[{wch:25},{wch:8},{wch:50},{wch:30},{wch:8},{wch:8}];
    XLSX.utils.book_append_sheet(wb,ws2,'Teams');
  }

  // Sheet 3: Missions
  if(sel.missions){
    const vMissions=ep?S.missions.filter(m=>m.property===ep||m.property==='all'):S.missions;
    const mData=[['Code','Title (TH)','Title (EN)','Property','Period','Difficulty','Type','Points','Deadline','Sub/Period']];
    vMissions.forEach(m=>{
      mData.push([m.code,m.title,m.titleEn,m.property,m.period,m.difficulty,m.type,m.points,m.deadline,m.submissionsPerPeriod||1]);
    });
    const ws3=XLSX.utils.aoa_to_sheet(mData);
    ws3['!cols']=[{wch:15},{wch:40},{wch:40},{wch:8},{wch:10},{wch:10},{wch:12},{wch:7},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws3,'Missions');
  }

  // Sheet 4: Submissions
  if(sel.submissions){
    const sData=[['Date','Submitter','Type','Property','Mission Title','Mission Code','Period','Points Earned','Status','Note','Admin Note','Photo Count']];
    fSubs.forEach(sub=>{
      const uu=S.users.find(x=>x.id===sub.userId);
      const tm=sub.teamId?S.teams.find(t=>t.id===sub.teamId):null;
      const m=S.missions.find(x=>x.id===sub.missionId);
      sData.push([
        sub.submittedAt,
        tm?tm.name:(uu?.name||'-'),
        tm?'Team':'Individual',
        sub.property||(tm?tm.property:uu?.property)||'-',
        m?.title||'-',
        m?.code||'-',
        m?.period||'-',
        sub.status==='approved'?(m?.points||0):0,
        sub.status,
        sub.note||'',
        sub.adminNote||'',
        sub.photos?.length||0,
      ]);
    });
    const ws4=XLSX.utils.aoa_to_sheet(sData);
    ws4['!cols']=[{wch:12},{wch:25},{wch:12},{wch:8},{wch:35},{wch:15},{wch:10},{wch:12},{wch:10},{wch:30},{wch:25},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws4,'Submissions');
  }

  // Sheet 5: Staff mission detail
  if(sel.submissions){
    const sdData=[['Name','Username','Property','Dept','Missions Done','Pending','Rejected','Total Points']];
    const vStaff=ep?S.users.filter(u=>u.property===ep&&u.role==='staff'):S.users.filter(u=>u.role==='staff');
    vStaff.forEach(u=>{
      const subs=fSubs.filter(s=>s.userId===u.id);
      const done=subs.filter(s=>s.status==='approved').map(s=>{const m=S.missions.find(x=>x.id===s.missionId);return m?.title||'';}).join('; ');
      sdData.push([u.name,u.username,u.property,u.dept,done||'-',subs.filter(s=>s.status==='pending').length,subs.filter(s=>s.status==='rejected').length,u.points]);
    });
    const ws5=XLSX.utils.aoa_to_sheet(sdData);
    ws5['!cols']=[{wch:25},{wch:15},{wch:8},{wch:20},{wch:60},{wch:9},{wch:9},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws5,'Staff-Missions');
  }

  const now=new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb,`GreenPulse_Report_${now}.xlsx`);
}
