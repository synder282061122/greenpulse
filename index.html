function exportPDF(){
  const ep=S.reportProp==='all'&&isSuper()?null:S.reportProp;
  const teamFilter=document.getElementById('pdf-team-filter')?.value||'all';
  const userFilter=document.getElementById('pdf-user-filter')?.value||'all';
  const propFilter=document.getElementById('pdf-prop-filter')?.value||'all';

  let subs=S.submissions.filter(s=>s.status==='approved');
  if(S.reportDateFrom) subs=subs.filter(s=>s.submittedAt>=S.reportDateFrom);
  if(S.reportDateTo) subs=subs.filter(s=>s.submittedAt<=S.reportDateTo);
  if(ep) subs=subs.filter(s=>s.property===ep||(S.users.find(u=>u.id===s.userId)?.property===ep));
  if(propFilter!=='all') subs=subs.filter(s=>{
    const u=S.users.find(x=>x.id===s.userId); const tm=s.teamId?S.teams.find(t=>t.id===s.teamId):null;
    return (s.property||tm?.property||u?.property)===propFilter;
  });
  if(teamFilter!=='all') subs=subs.filter(s=>s.teamId===teamFilter);
  if(userFilter!=='all') subs=subs.filter(s=>s.userId===userFilter);

  const now=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  const dateRange=S.reportDateFrom||S.reportDateTo?`ช่วงวันที่: ${S.reportDateFrom||'ตั้งแต่ต้น'} ถึง ${S.reportDateTo||'ปัจจุบัน'}`:'ทุกช่วงเวลา';

  // Group subs
  const groups={};

    const u=S.users.find(x=>x.id===sub.userId);
    const tm=sub.teamId?S.teams.find(t=>t.id===sub.teamId):null;
    const m=S.missions.find(x=>x.id===sub.missionId);

    groups[key].items.push({date:sub.submittedAt, mission:m?.title||'?', pts:m?.points||0, note:sub.note||''});
  });

  const rows=Object.entries(groups).map(([name,g])=>`
    <tr style="background:#f0fdf9"><td colspan="3" style="font-weight:800;color:#0d9488;padding:8px 10px;font-size:13px">${name}</td><td style="font-weight:800;color:#00c896;text-align:right;padding:8px 10px">${g.pts.toLocaleString()} pts</td></tr>

  `).join('');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>GreenPulse Report</title>
  <style>
    body{font-family:'Sarabun','Helvetica',sans-serif;margin:0;padding:24px;color:#0f4c35;font-size:12px}
    h1{color:#00c896;font-size:22px;margin-bottom:4px}
    .sub{color:#6b9e89;font-size:11px;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;margin-top:14px}
    th{background:#ecfdf5;color:#166534;padding:8px 10px;text-align:left;border-bottom:2px solid #a7f3d0;font-size:11px}
    td{border-bottom:1px solid #e6fdf5;vertical-align:top}
    @media print{body{padding:12px}}
  </style></head><body>
  <h1>🌿 GreenPulse — รายงานผลการดำเนินงาน</h1>
  <div class="sub">วันที่พิมพ์: ${now} | ${dateRange} | ${teamFilter!=='all'?'ทีม: '+S.teams.find(t=>t.id===teamFilter)?.name:userFilter!=='all'?'บุคคล: '+S.users.find(u=>u.id===userFilter)?.name:propFilter!=='all'?'สาขา: '+propFilter:'ทุกหน่วย'}</div>
  <table><thead><tr><th>วันที่</th><th>ภารกิจ</th><th>หมายเหตุ</th><th style="text-align:right">คะแนน</th></tr></thead>
  <tbody>${rows}</tbody>
  <tfoot><tr style="background:#ecfdf5"><td colspan="3" style="padding:9px 10px;font-weight:800;font-size:13px">รวมทั้งหมด</td><td style="padding:9px 10px;font-weight:800;color:#00c896;font-size:14px;text-align:right">${subs.reduce((a,s)=>a+(S.missions.find(x=>x.id===s.missionId)?.points||0),0).toLocaleString()} pts</td></tr></tfoot>
  </table></body></html>`;

  const w=window.open('','_blank');
  w.document.write(html);

async function exportPhotosZip(){
  const ep=S.reportProp==='all'&&isSuper()?null:S.reportProp;
  const vSubs=ep?S.submissions.filter(s=>s.property===ep):S.submissions;
  const subsWithPhotos=vSubs.filter(s=>s.photos&&s.photos.length>0);
  if(subsWithPhotos.length===0){alert('ไม่มีรูปภาพในระบบ');return;}

  const zip=new JSZip();
  const now=new Date().toISOString().split('T')[0];

  subsWithPhotos.forEach(sub=>{
    const uu=S.users.find(x=>x.id===sub.userId);
    const tm=sub.teamId?S.teams.find(t=>t.id===sub.teamId):null;
    const m=S.missions.find(x=>x.id===sub.missionId);
    const submitter=(tm?tm.name:uu?.name||'unknown').replace(/[^a-zA-Z0-9ก-๛]/g,'_');
    const mCode=(m?.code||'unknown').replace(/[^a-zA-Z0-9]/g,'_');
    const folder=`${sub.property||'ALL'}/${mCode}_${submitter}_${sub.submittedAt}`;

    sub.photos.forEach((ph,i)=>{
      if(ph.startsWith('data:')){
        const [meta,b64]=ph.split(',');
        const ext=meta.includes('png')?'png':'jpg';
        const binary=atob(b64);
        const bytes=new Uint8Array(binary.length);
        for(let j=0;j<binary.length;j++) bytes[j]=binary.charCodeAt(j);
        zip.file(`${folder}/photo_${i+1}.${ext}`,bytes,{binary:true});
      }
    });
  });

  // Add a manifest text file
  let manifest=`GreenPulse Photo Export\nDate: ${now}\nTotal submissions: ${subsWithPhotos.length}\n\n`;
  subsWithPhotos.forEach(sub=>{
    const uu=S.users.find(x=>x.id===sub.userId);
    const tm=sub.teamId?S.teams.find(t=>t.id===sub.teamId):null;
    const m=S.missions.find(x=>x.id===sub.missionId);
    manifest+=`---\nSubmitter: ${tm?tm.name:uu?.name}\nMission: ${m?.title||'?'}\nDate: ${sub.submittedAt}\nStatus: ${sub.status}\nPhotos: ${sub.photos.length}\n`;
  });
  zip.file('manifest.txt',manifest);

  const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`GreenPulse_Photos_${now}.zip`;
  a.click();
}

function downloadStaffTemplate(){

function parseCsvLine(line){
  const res=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur.trim());cur='';}
    else cur+=c;
  }
  res.push(cur.trim());
  return res;
}

function importStaffFromFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
      const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('Notes'));
      const myProp=isSuper()?null:S.currentUser.property;
      let imported=0,errors=[];
      lines.slice(2).forEach((line,i)=>{
        if(!line) return;
        const cols=parseCsvLine(line);
        if(cols.length<4){errors.push(`Row ${i+3}: not enough columns`);return;}
        const [name,username,password,property,dept,role]=cols;
        if(!name||!username||!password){errors.push(`Row ${i+3}: Name/Username/Password required`);return;}
        const fp=myProp||(property||'CCH');
        if(!['CCH','CHBR','CWR'].includes(fp)){errors.push(`Row ${i+3}: invalid property "${fp}"`);return;}
        if(S.users.find(u=>u.username===username.trim())){errors.push(`Row ${i+3}: username "${username}" exists`);return;}
        S.users=[...S.users,{id:uid(),name:name.trim(),username:username.trim().toLowerCase(),password:password.trim(),property:fp,dept:(dept||'Back of House').trim(),role:(role||'staff').trim(),points:0,badges:[],streak:0,active:true,teamId:null}];
        imported++;
      });
      if(errors.length>0) alert(`Import done\nAdded: ${imported}\n\nErrors:\n${errors.slice(0,5).join('\n')}`);
      else alert(`✅ Import success! Added ${imported} staff.`);
      setState({});
    }catch(err){alert('Cannot read file: '+err.message);}
  };
  reader.readAsText(file,'utf-8');
}

  const regTeamField=document.getElementById('regTeamField');
  if(regRadios.length&&regTeamField){
    regRadios.forEach(r=>r.addEventListener('change',()=>{
      regTeamField.style.display=r.value==='team'&&r.checked?'block':'none';
    }));
  }
  // Register form: filter team list by selected property
  const regPropSel=document.getElementById('regProp');
  const regTeamSel=document.getElementById('regTeam');
  if(regPropSel&&regTeamSel){
    regPropSel.addEventListener('change',()=>{
      const p=regPropSel.value;
      const filtered=S.teams.filter(t=>t.property===p);
      regTeamSel.innerHTML='<option value="">— ยังไม่เลือกทีม —</option>'+
        filtered.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
    });
  }
  document.querySelectorAll('[data-action="importStaff"]').forEach(el=>el.addEventListener('click',()=>{
    const fi=document.getElementById('importCsvInput');
    if(fi){fi.value='';fi.click();}
  }));
  const importInput=document.getElementById('importCsvInput');
  if(importInput) importInput.addEventListener('change',e=>{if(e.target.files[0])importStaffFromFile(e.target.files[0]);});
  // Confirm action
  const ca=document.querySelector('[data-action="confirmAction"]');
  if(ca&&S.modal?._action) ca.addEventListener('click',S.modal._action);

  // Export snapshot (for cross-device transfer)
  document.querySelectorAll('[data-action="exportSnapshot"]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    FB.exportSnapshot();
    alert('✅ ดาวน์โหลดข้อมูลแล้ว!\n\nนำไฟล์ .json ไปเปิดในอุปกรณ์อื่น แล้วกด "นำเข้าข้อมูล"\n(ทำงานบน Netlify เท่ากัน คนละเครื่อง)');
  }));

  // Import snapshot (from another device)
  const importSnap=document.getElementById('importSnapshotFile');
  if(importSnap) importSnap.addEventListener('change',async e=>{
    if(!e.target.files[0]) return;
    const ok=confirm('นำเข้าข้อมูลจากไฟล์นี้?\n⚠️ ข้อมูลปัจจุบันจะถูกแทนที่');
    if(!ok) return;
    try{
      await FB.importSnapshot(e.target.files[0]);
      alert('✅ นำเข้าข้อมูลสำเร็จ! กำลังโหลดใหม่...');
      setTimeout(()=>location.reload(),800);
    }catch(err){
      alert('❌ นำเข้าไม่ได้: '+err.message);
    }
  });
  // Modal close
  const mOverlay=document.getElementById('modalOverlay');
  if(mOverlay) mOverlay.addEventListener('click',e=>{if(e.target===mOverlay&&Date.now()-S._modalOpenTime>800)setState({modal:null});});
  document.querySelectorAll('[data-closemodal]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();setState({modal:null});}));
}

function _v(id){return document.getElementById(id)?.value||'';}

/* ══════════════════════════════════════════════════════════
   BUSINESS LOGIC
══════════════════════════════════════════════════════════ */
function doLogin(){
  const username=document.getElementById('loginUser')?.value?.trim()||'';
  const pw=document.getElementById('loginPw')?.value||'';
  const u=S.users.find(x=>x.username===username&&x.password===pw);
  if(u){
    if(!u.active){alert('บัญชีนี้ถูกปิดการใช้งาน');return;}
    S.currentUser=u;
    setState({page:'dashboard',sideOpen:false,prevPages:[],loginTab:'login'},true);
  } else {
    alert(S.lang==='th'?'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง':'Invalid credentials');
  }
}

function doRegister(){
  const name=(document.getElementById('regName')?.value||'').trim();
  const username=(document.getElementById('regUser')?.value||'').trim().toLowerCase();
  const pw=document.getElementById('regPw')?.value||'';
  const pw2=document.getElementById('regPw2')?.value||'';
  const property=document.getElementById('regProp')?.value||'CCH';
  const dept=document.getElementById('regDept')?.value||'Back of House';
  const typeVal=document.querySelector('[name="regType"]:checked')?.value||'individual';
  const teamId=typeVal==='team'?(document.getElementById('regTeam')?.value||null):null;

  if(!name){alert('กรุณากรอกชื่อ-นามสกุล');return;}
  if(!username||username.length<3){alert('ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร');return;}
  if(!/^[a-z0-9._]+$/.test(username)){alert('ชื่อผู้ใช้ใช้ได้เฉพาะตัวอักษรเล็ก ตัวเลข จุด และขีดล่าง');return;}
  if(S.users.find(u=>u.username===username)){alert('ชื่อผู้ใช้นี้มีคนใช้แล้ว กรุณาเลือกใหม่');return;}
  if(pw.length<4){alert('รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร');return;}
  if(pw!==pw2){alert('รหัสผ่านไม่ตรงกัน กรุณากรอกอีกครั้ง');return;}

  const newUser={
    id:uid(), name, username, password:pw,
    property, dept, role:'staff',
    points:0, badges:[], streak:0, active:true,
    teamId: teamId||null,
  };
  S.users=[...S.users, newUser];

  // If joining a team, add memberIds
  if(teamId){
    S.teams=S.teams.map(t=>t.id===teamId?{...t, memberIds:[...(t.memberIds||[]), newUser.id]}:t);
  }

  // Notify admins
  S.users.filter(u=>u.role==='admin1'||(u.role==='admin2'&&u.property===property)).forEach(admin=>{
    S.notifications=[...S.notifications,{
      id:uid(), userId:admin.id,
      msg:`👋 ${name} ลงทะเบียนใหม่ (${property} • ${dept})`,
      msgEn:`👋 ${name} registered (${property} • ${dept})`,
      read:false, time:new Date().toISOString().split('T')[0]
    }];
  });

  S.currentUser=newUser;
  alert(`✅ ลงทะเบียนสำเร็จ!\nยินดีต้อนรับ ${name} 🌿`);
  setState({page:'dashboard', sideOpen:false, prevPages:[], loginTab:'login'}, false);
}

function approveSub(subId){
  const sub=S.submissions.find(s=>s.id===subId);
  if(!sub) return;
  const m=S.missions.find(x=>x.id===sub.missionId);
  S.submissions=S.submissions.map(s=>s.id===subId?{...s,status:'approved',adminNote:'Approved ✅'}:s);
  if(m){
    if(sub.userId) S.users=S.users.map(u=>u.id===sub.userId?{...u,points:u.points+(m.points||0),streak:u.streak+1}:u);
    if(sub.teamId) S.teams=S.teams.map(t=>t.id===sub.teamId?{...t,points:t.points+(m.points||0)}:t);
  }
  if(S.currentUser&&sub.userId===S.currentUser.id) S.currentUser={...S.currentUser,points:S.currentUser.points+(m?.points||0)};
  const tid=sub.userId||(sub.teamId?S.users.find(u=>u.teamId===sub.teamId&&u.role==='staff')?.id:null);
  if(tid) S.notifications=[...S.notifications,{id:uid(),userId:tid,msg:`ภารกิจ "${m?.title}" ผ่าน! +${m?.points} pts 🎉`,msgEn:`Mission "${m?.titleEn}" approved! +${m?.points} pts 🎉`,read:false,time:new Date().toISOString().split('T')[0]}];
  // Immediate save — points change must not be lost
  schedSave(true);
  render();
}

function rejectSub(subId){
  const sub=S.submissions.find(s=>s.id===subId);
  if(!sub) return;
  S.submissions=S.submissions.map(s=>s.id===subId?{...s,status:'rejected',adminNote:'หลักฐานไม่ชัดเจน กรุณาส่งใหม่'}:s);
  if(sub.userId) S.notifications=[...S.notifications,{id:uid(),userId:sub.userId,msg:'ภารกิจถูกปฏิเสธ กรุณาส่งใหม่ 📷',msgEn:'Mission rejected. Please resubmit.',read:false,time:new Date().toISOString().split('T')[0]}];
  schedSave(true);
  render();
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
(async()=>{
  // Init Firebase (or fallback to localStorage)
  await FB.init();
  await loadPersistedData();
  // Auto-save every 30s (non-blocking) — catches any missed changes
  setInterval(async()=>{if(S.currentUser&&!_pendingSave) await persistAll();},30000);
  render();
})();
</script>
